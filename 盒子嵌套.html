<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>JS创建嵌套盒子</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }
    </style>
</head>
<body>
    <script>
        // 1. 创建大盒子
        const bigBox = document.createElement('div');
        bigBox.style.width = '400px';
        bigBox.style.height = '400px';
        bigBox.style.backgroundColor = 'pink';
        bigBox.style.margin = '10px auto';
        bigBox.style.display = 'flex';
        bigBox.style.justifyContent = 'center';
        bigBox.style.alignItems = 'center';

        // 2. 创建小盒子
        const smallBox = document.createElement('div');
        smallBox.style.width = '200px';
        smallBox.style.height = '200px';
        smallBox.style.backgroundColor = 'blue';
        smallBox.style.color = 'white';
        smallBox.style.lineHeight = '200px';
        smallBox.style.textAlign = 'center';
        smallBox.textContent = '这是个小盒子';

        // 3. 嵌套：小盒子放进大盒子
        bigBox.appendChild(smallBox);

        // 4. 挂载到页面
        document.body.appendChild(bigBox);
    </script>
</body>
</html>
